properties
# Project-wide Gradle settings.
# Increased memory for faster builds
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX is the modern standard for Android libraries
android.useAndroidX=true

# Enforces official Kotlin code style
kotlin.code.style=official

# Improves build speed by only generating R classes for the current module
android.nonTransitiveRClass=true

# --- PERFORMANCE OPTIMIZATIONS ---
# Enables parallel project execution for faster builds
org.gradle.parallel=true

# Speeds up project configuration by caching build data
org.gradle.configuration-cache=true

# Suggested by your build warning to improve import performance
android.dependency.excludeLibraryComponentsFromConstraints=true
android.defaults.buildfeatures.resvalues=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
android.enableAppCompileTimeRClass=false
android.onlyEnableUnitTestForTheTestedBuildType=false
android.usesSdkInManifest.disallowed=false
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
android.r8.optimizedResourceShrinking=false
android.builtInKotlin=false
android.newDsl=false

# --- REMOVED DEPRECATED FLAGS ---
# The following flags were removed because they are deprecated/unnecessary in AGP 8+:
# - android.defaults.buildfeatures.resvalues (Now set in build.gradle)
# - android.sdk.defaultTargetSdkToCompileSdkIfUnset
# - android.enableAppCompileTimeRClass
# - android.usesSdkInManifest.disallowed
# - android.builtInKotlin
# - android.newDsl
# - android.r8.optimizedResourceShrinking